name: CI

# Gate de testes para pull requests e branches de trabalho. O mesmo gate roda
# (como pré-requisito do build) em .github/workflows/deploy.yml no push a main.
# Tier 0 de segurança clínica: o fail-safe do classificador de crise (ADR-006)
# e a integridade do dataset de crise são verificados aqui.

on:
  pull_request:
  push:
    branches-ignore: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python services — lint + tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        service: [orchestrator-py, agents-py, notifier-py]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install
        working-directory: apps/${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        working-directory: apps/${{ matrix.service }}
        run: ruff check .

      - name: Pytest
        working-directory: apps/${{ matrix.service }}
        run: pytest -q

  # Build .NET — pega erro de compilação do gateway no PR (antes era só no
  # deploy: ex. CS0101 de tipo duplicado pós-merge passou despercebido).
  dotnet:
    name: api-gateway — build (.NET)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        working-directory: apps/api-gateway
        run: dotnet restore

      - name: Build
        working-directory: apps/api-gateway
        run: dotnet build --no-restore --configuration Release

  # Regressão de isolamento de tenant (Camada B / Estágio 3). Sobe Postgres real
  # (pgvector) via Testcontainers, aplica as migrations, seeda 2 médicos e prova
  # que médico A não lê/altera dado do paciente de B. Pega os IDOR cross-tenant
  # (classe dos 7 achados em 2026-06-08) ANTES do merge. Docker já vem no runner.
  dotnet-tests:
    name: api-gateway — testes de isolamento de tenant
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Test
        working-directory: apps/api-gateway-tests
        run: dotnet test --configuration Release --logger "console;verbosity=normal"

  # Build Next.js — pega erro de compilação/TS do web no PR (antes só no deploy
  # ou no Vercel preview). Espelha o Dockerfile: Node 24 + pnpm 10 + next build.
  web:
    name: web — build (Next.js)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10.33.3 --activate

      - name: Install
        run: pnpm install --frozen-lockfile --filter "./apps/web..."

      - name: Build
        working-directory: apps/web
        run: pnpm build
