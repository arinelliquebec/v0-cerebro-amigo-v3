name: Deploy to EC2

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  ECR: 004177894935.dkr.ecr.sa-east-1.amazonaws.com

# ─── Topologia de deploy (ADR-045) ───────────────────────────────────────────
#
# Dois destinos independentes, deploy condicional por path (não recria o que não
# mudou; push só-docs não deploya nada):
#   • CLÍNICO  (web, api-gateway, 3 py) → box EC2 i-057860cd97edafefb via SSM compose.
#   • CHECKUP  (apps/checkup)           → ASG `cerebro-checkup-asg` via instance refresh.
#
# BUILD = 100% NO CI. As 6 imagens clínicas são buildadas pelo job `build-clinical`
# (docker/bake-action, cache GHA) e empurradas pro ECR. O box SÓ faz `pull` + `up -d
# --no-build` — nunca compila (sbt/dotnet/next ficam no CI). O `--no-build` é a guarda:
# sem ele, `compose up` cairia pro `build:` local (dev-only) se um pull falhasse →
# sbt/assembly na EC2 = explosão de memória. Com ele, falta de imagem falha alto.
#
# ─── Rollback ──────────────────────────────────────────────────────────────
# Clínico: SSM na EC2 → IMAGE_TAG=<sha-anterior>; docker compose pull && up -d --remove-orphans.
# Checkup: SSM put /cerebro-amigo/checkup/image-tag=<sha-anterior> + start-instance-refresh do ASG.
# Imagens de SHAs anteriores ficam no ECR (lifecycle keep last 10). Ver infra/aws/setup-ecr.sh.

jobs:
  # ─── Detecta o que mudou (gate de path) ──────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      clinical: ${{ steps.filter.outputs.clinical }}
      checkup: ${{ steps.filter.outputs.checkup }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            clinical:
              - 'apps/web/**'
              - 'apps/api-gateway/**'
              - 'apps/orchestrator-py/**'
              - 'apps/agents-py/**'
              - 'apps/notifier-py/**'
              - 'docker-compose.yml'
              - '.github/docker-bake.hcl'
              - '.github/workflows/deploy.yml'
              - 'pnpm-lock.yaml'
            checkup:
              - 'apps/checkup/**'
              - '.github/docker-bake.hcl'
              - '.github/workflows/deploy.yml'
              - 'pnpm-lock.yaml'
            # Subconjunto do clínico: só mexe no ASG do web (cerebro-web-asg) quando
            # o web muda — evita instance refresh à toa em mudança só de gateway/py.
            web:
              - 'apps/web/**'
              - '.github/docker-bake.hcl'
              - '.github/workflows/deploy.yml'
              - 'pnpm-lock.yaml'

  # ─── Gate de testes do clínico (Tier 0 segurança clínica) ────────────────
  # Nenhuma imagem clínica deploya sem os testes Python passarem (classificador
  # de crise ADR-006 + integridade do dataset). Espelho do gate em ci.yml.
  test:
    name: Tests — ${{ matrix.service }}
    needs: changes
    if: needs.changes.outputs.clinical == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: true
      matrix:
        service: [orchestrator-py, agents-py, notifier-py]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/${{ matrix.service }}/pyproject.toml

      - name: Install + lint + test
        working-directory: apps/${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          ruff check .
          pytest -q

  # ─── Gate de smoke do checkup (RUNTIME) ──────────────────────────────────
  smoke-checkup:
    name: Smoke — checkup
    needs: changes
    if: needs.changes.outputs.checkup == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install (checkup)
        run: pnpm install --frozen-lockfile --filter "./apps/checkup..."

      - name: Unit tests (vitest)
        working-directory: apps/checkup
        run: pnpm test

      - name: Build (checkup)
        working-directory: apps/checkup
        run: pnpm build

      - name: Start + smoke
        working-directory: apps/checkup
        run: |
          PORT=3001 node_modules/.bin/next start -p 3001 &
          SV=$!
          for i in $(seq 1 30); do curl -sf http://localhost:3001/api/health >/dev/null && break; sleep 2; done
          bash scripts/smoke.sh http://localhost:3001
          R=$?
          kill $SV 2>/dev/null || true
          exit $R

  # ─── Build clínico (6 imagens) → ECR ─────────────────────────────────────
  build-clinical:
    name: Build clínico → ECR
    needs: [changes, test]
    if: needs.changes.outputs.clinical == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: private
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push (clinical)
        uses: docker/bake-action@v7
        env:
          TAG: ${{ github.sha }}
          # NEXT_PUBLIC_* do web → build-args (inlined no bundle). GitHub Secrets.
          # Sem eles a imagem web sai com captcha/push vazios. Ver runbook.
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
          NEXT_PUBLIC_HUB_URL: ${{ secrets.NEXT_PUBLIC_HUB_URL }}
          NEXT_PUBLIC_MANUAL_PIX_CHAVE: ${{ secrets.NEXT_PUBLIC_MANUAL_PIX_CHAVE }}
          NEXT_PUBLIC_MANUAL_PIX_NOME: ${{ secrets.NEXT_PUBLIC_MANUAL_PIX_NOME }}
          NEXT_PUBLIC_MANUAL_PAGAMENTO_URL: ${{ secrets.NEXT_PUBLIC_MANUAL_PAGAMENTO_URL }}
        with:
          files: .github/docker-bake.hcl
          targets: clinical
          push: true
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

  # ─── Build checkup (1 imagem) → ECR ──────────────────────────────────────
  build-checkup:
    name: Build checkup → ECR
    needs: [changes, smoke-checkup]
    if: needs.changes.outputs.checkup == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: private
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push (checkup)
        uses: docker/bake-action@v7
        env:
          TAG: ${{ github.sha }}
        with:
          files: .github/docker-bake.hcl
          targets: checkup
          push: true
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

  # ─── Deploy clínico via SSM (box EC2) ────────────────────────────────────
  deploy-clinical:
    name: Deploy clínico (SSM)
    needs: [changes, build-clinical]
    if: needs.changes.outputs.clinical == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Deploy via SSM
        id: ssm
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-057860cd97edafefb" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "set -euo pipefail",
              "export HOME=/root",
              "export IMAGE_TAG=${{ github.sha }}",
              "git config --global --add safe.directory /opt/cerebro-amigo-v3",
              "cd /opt/cerebro-amigo-v3",
              "git pull origin main",
              "aws ecr get-login-password --region sa-east-1 | docker login --username AWS --password-stdin 004177894935.dkr.ecr.sa-east-1.amazonaws.com",
              "docker image prune -af",
              "docker builder prune -af || true",
              "docker compose pull",
              "docker compose stop api-gateway || true",
              "docker compose up -d --no-build --remove-orphans",
              "for i in $(seq 1 30); do curl -sf http://localhost:5050/health | grep -q ok && curl -sf http://localhost:5050/ready | grep -q ready && break; [ $i -lt 30 ] && sleep 3 || { echo api-gateway nao saudavel; exit 1; }; done && echo api-gateway ok",
              "for i in $(seq 1 30); do curl -sf http://localhost:8081/health | grep -q ok && curl -sf http://localhost:8081/ready | grep -q ready && break; [ $i -lt 30 ] && sleep 3 || { echo orchestrator-py nao saudavel; exit 1; }; done && echo orchestrator-py ok",
              "for i in $(seq 1 30); do curl -sf http://localhost:8082/health | grep -q ok && curl -sf http://localhost:8082/ready | grep -q ready && break; [ $i -lt 30 ] && sleep 3 || { echo agents-py nao saudavel; exit 1; }; done && echo agents-py ok",
              "for i in $(seq 1 30); do curl -sf http://localhost:8083/health | grep -q ok && curl -sf http://localhost:8083/ready | grep -q ready && break; [ $i -lt 30 ] && sleep 3 || { echo notifier-py nao saudavel; exit 1; }; done && echo notifier-py ok",
              "docker image prune -af || true",
              "echo prune pos-deploy ok - imagens antigas removidas, rollback via ECR",
              "echo deploy ok"
            ]' \
            --timeout-seconds 1200 \
            --region sa-east-1 \
            --query 'Command.CommandId' \
            --output text)

          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT
          echo "SSM command: $COMMAND_ID"

      - name: Wait for deploy to finish
        run: |
          COMMAND_ID="${{ steps.ssm.outputs.command_id }}"
          INSTANCE_ID="i-057860cd97edafefb"

          # 80 × 15s = 1200s — alinhado ao --timeout-seconds do SSM
          for i in $(seq 1 80); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --region sa-east-1 \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")

            echo "[$i/80] Status: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "Deploy succeeded."
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Deploy failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --region sa-east-1 \
                --query 'StandardErrorContent' \
                --output text
              exit 1
            fi

            sleep 15
          done

          echo "Timed out waiting for deploy"
          exit 1

  # ─── Deploy checkup no ASG (instance refresh) ────────────────────────────
  deploy-checkup:
    name: Deploy checkup (ASG)
    needs: [changes, build-checkup]
    if: needs.changes.outputs.checkup == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Bump image-tag + instance refresh
        run: |
          set -euo pipefail
          ASG=cerebro-checkup-asg
          aws ssm put-parameter --region sa-east-1 \
            --name /cerebro-amigo/checkup/image-tag --type String --overwrite \
            --value "${{ github.sha }}"
          RID=$(aws autoscaling start-instance-refresh --region sa-east-1 \
            --auto-scaling-group-name "$ASG" \
            --preferences '{"MinHealthyPercentage":100,"MaxHealthyPercentage":200,"InstanceWarmup":60}' \
            --query InstanceRefreshId --output text)
          echo "instance refresh: $RID"
          # zero-downtime (launch antes de terminar); espera concluir
          for i in $(seq 1 45); do
            ST=$(aws autoscaling describe-instance-refreshes --region sa-east-1 \
              --auto-scaling-group-name "$ASG" --instance-refresh-ids "$RID" \
              --query "InstanceRefreshes[0].Status" --output text)
            echo "[$i/45] $ST"
            case "$ST" in
              Successful) echo "checkup ASG atualizado"; exit 0;;
              Failed|Cancelled|RollbackSuccessful|RollbackFailed) echo "refresh terminou em $ST"; exit 1;;
            esac
            sleep 20
          done
          echo "timeout aguardando instance refresh"; exit 1

      - name: Invalidar cache CF (novo build Next.js)
        run: |
          set -euo pipefail
          # ID da distribuição: SSM (preferido) → fallback por alias na API do
          # CloudFront (cobre a falta de ssm:GetParameter no user do CI — ver
          # runbook docs/runbooks/cloudfront-checkup.md).
          CF_ID=$(aws ssm get-parameter --region sa-east-1 \
            --name /cerebro-amigo/checkup/cf-distribution-id \
            --query Parameter.Value --output text 2>/dev/null) || CF_ID=""
          if [ -z "$CF_ID" ]; then
            echo "ssm:GetParameter negado — tentando lookup por alias no CloudFront"
            CF_ID=$(aws cloudfront list-distributions --query \
              "DistributionList.Items[?contains(Aliases.Items, 'checkup.cerebroamigo.com.br')].Id | [0]" \
              --output text 2>/dev/null) || CF_ID=""
          fi
          if [ -z "$CF_ID" ] || [ "$CF_ID" = "None" ]; then
            echo "::error::Sem permissão p/ descobrir o distribution ID (ssm:GetParameter E cloudfront:ListDistributions negados). Cache do CF NÃO invalidado — HTML antigo pode ser servido. Fix: policy no runbook docs/runbooks/cloudfront-checkup.md."
            exit 1
          fi
          # Invalida tudo: HTML das páginas pode referenciar chunks de build anterior
          aws cloudfront create-invalidation \
            --distribution-id "$CF_ID" \
            --paths "/*" \
            --query 'Invalidation.{Id:Id,Status:Status}' --output table

  # ─── Deploy web no ASG próprio (instance refresh) ────────────────────────
  # Migração Vercel → EC2 (infra/aws/web-asg-alb.yaml). A imagem web já é buildada
  # em build-clinical (target web do bake, com NEXT_PUBLIC_* embutidos); este job só
  # aponta o ASG p/ o novo SHA e faz o refresh. Roda só quando apps/web muda.
  # Coexiste com o web do compose no box clínico até o cutover de DNS desligar a Vercel.
  deploy-web:
    name: Deploy web (ASG)
    needs: [changes, build-clinical]
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Bump image-tag + instance refresh
        run: |
          set -euo pipefail
          ASG=cerebro-web-asg
          aws ssm put-parameter --region sa-east-1 \
            --name /cerebro-amigo/web/image-tag --type String --overwrite \
            --value "${{ github.sha }}"
          RID=$(aws autoscaling start-instance-refresh --region sa-east-1 \
            --auto-scaling-group-name "$ASG" \
            --preferences '{"MinHealthyPercentage":100,"MaxHealthyPercentage":200,"InstanceWarmup":60}' \
            --query InstanceRefreshId --output text)
          echo "instance refresh: $RID"
          # zero-downtime (launch antes de terminar); espera concluir
          for i in $(seq 1 45); do
            ST=$(aws autoscaling describe-instance-refreshes --region sa-east-1 \
              --auto-scaling-group-name "$ASG" --instance-refresh-ids "$RID" \
              --query "InstanceRefreshes[0].Status" --output text)
            echo "[$i/45] $ST"
            case "$ST" in
              Successful) echo "web ASG atualizado"; exit 0;;
              Failed|Cancelled|RollbackSuccessful|RollbackFailed) echo "refresh terminou em $ST"; exit 1;;
            esac
            sleep 20
          done
          echo "timeout aguardando instance refresh"; exit 1
