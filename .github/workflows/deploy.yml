name: Deploy to EC2

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ECR: 004177894935.dkr.ecr.sa-east-1.amazonaws.com

# ─── Rollback ──────────────────────────────────────────────────────────────
#
# Para reverter para um SHA anterior, conecte na EC2 via SSM e execute:
#
#   export IMAGE_TAG=<sha-anterior>
#   aws ecr get-login-password --region sa-east-1 \
#     | docker login --username AWS --password-stdin \
#       004177894935.dkr.ecr.sa-east-1.amazonaws.com
#   cd /opt/cerebro-amigo-v3
#   git checkout <sha-anterior> -- docker-compose.yml
#   docker compose pull
#   docker compose up -d --remove-orphans
#
# As imagens de SHAs anteriores ficam disponíveis no ECR enquanto a lifecycle
# policy (keep last 10) não as apagar. Ver infra/aws/setup-ecr.sh.

jobs:
  # ─── Job 0: gate de testes (BLOQUEIA o deploy se falhar) ─────────────────
  #
  # Tier 0 de segurança clínica: nenhuma imagem é buildada/deployada sem que
  # os testes dos serviços Python passem. Inclui o gate de fail-safe do
  # classificador de crise (ADR-006) e a integridade do dataset de crise.
  # Ver também .github/workflows/ci.yml (mesmo gate em pull requests).
  test:
    name: Tests — ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: true
      matrix:
        service: [orchestrator-py, agents-py, notifier-py]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/${{ matrix.service }}/pyproject.toml

      - name: Install + lint + test
        working-directory: apps/${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          ruff check .
          pytest -q

  # ─── Job 0.5: smoke do checkup (BLOQUEIA o deploy se falhar) ─────────────
  #
  # Builda o checkup, sobe o servidor e roda apps/checkup/scripts/smoke.sh contra
  # localhost — pega regressão de RUNTIME que o build não vê (ex.: o 500 do
  # /api/pdf quando o @react-pdf/renderer era bundlado pelo Turbopack, CK-1/CK-7).
  # CI-safe: sem DB/Anthropic → devolutiva no fallback, events ok, PDF é puro SSR.
  smoke-checkup:
    name: Smoke — checkup
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install (checkup)
        run: pnpm install --frozen-lockfile --filter "./apps/checkup..."

      - name: Unit tests (vitest)
        working-directory: apps/checkup
        run: pnpm test

      - name: Build (checkup)
        working-directory: apps/checkup
        run: pnpm build

      - name: Start + smoke
        working-directory: apps/checkup
        run: |
          PORT=3001 node_modules/.bin/next start -p 3001 &
          SV=$!
          for i in $(seq 1 30); do curl -sf http://localhost:3001/api/health >/dev/null && break; sleep 2; done
          bash scripts/smoke.sh http://localhost:3001
          R=$?
          kill $SV 2>/dev/null || true
          exit $R

  # ─── Job 1: build e push das 5 imagens para o ECR (paralelo + cache) ─────
  build:
    name: Build & push to ECR
    needs: [test, smoke-checkup]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: private

      # Buildx para suporte a cache inline (type=gha)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Builds paralelos via buildx bake. Cada serviço usa a camada de cache
      # do GitHub Actions — deps inalteradas não são baixadas/compiladas.
      - name: Build and push all images
        uses: docker/bake-action@v6
        env:
          TAG: ${{ github.sha }}
        with:
          files: .github/docker-bake.hcl
          push: true
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

  # ─── Job 2: deploy via SSM (pull + up, sem build na EC2) ─────────────────
  deploy:
    name: SSM deploy
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Deploy via SSM
        id: ssm
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-057860cd97edafefb" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "set -euo pipefail",
              "export HOME=/root",
              "export IMAGE_TAG=${{ github.sha }}",
              "git config --global --add safe.directory /opt/cerebro-amigo-v3",
              "cd /opt/cerebro-amigo-v3",
              "git pull origin main",
              "aws ecr get-login-password --region sa-east-1 | docker login --username AWS --password-stdin 004177894935.dkr.ecr.sa-east-1.amazonaws.com",
              "docker image prune -af",
              "docker compose pull",
              "docker compose up -d --remove-orphans",
              "for i in $(seq 1 30); do curl -sf http://localhost:5050/health | grep -q ok && curl -sf http://localhost:5050/ready | grep -q ready && break; [ $i -lt 30 ] && sleep 3 || { echo api-gateway nao saudavel; exit 1; }; done && echo api-gateway ok",
              "for i in $(seq 1 30); do curl -sf http://localhost:8081/health | grep -q ok && curl -sf http://localhost:8081/ready | grep -q ready && break; [ $i -lt 30 ] && sleep 3 || { echo orchestrator-py nao saudavel; exit 1; }; done && echo orchestrator-py ok",
              "for i in $(seq 1 30); do curl -sf http://localhost:8082/health | grep -q ok && curl -sf http://localhost:8082/ready | grep -q ready && break; [ $i -lt 30 ] && sleep 3 || { echo agents-py nao saudavel; exit 1; }; done && echo agents-py ok",
              "for i in $(seq 1 30); do curl -sf http://localhost:8083/health | grep -q ok && curl -sf http://localhost:8083/ready | grep -q ready && break; [ $i -lt 30 ] && sleep 3 || { echo notifier-py nao saudavel; exit 1; }; done && echo notifier-py ok",
              "for i in $(seq 1 30); do curl -sf http://localhost:3001/api/health | grep -q ok && break; [ $i -lt 30 ] && sleep 3 || { echo checkup nao saudavel; exit 1; }; done && echo checkup ok",
              "echo deploy ok"
            ]' \
            --timeout-seconds 1200 \
            --region sa-east-1 \
            --query 'Command.CommandId' \
            --output text)

          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT
          echo "SSM command: $COMMAND_ID"

      - name: Wait for deploy to finish
        run: |
          COMMAND_ID="${{ steps.ssm.outputs.command_id }}"
          INSTANCE_ID="i-057860cd97edafefb"

          # 80 × 15s = 1200s — alinhado ao --timeout-seconds do SSM
          for i in $(seq 1 80); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --region sa-east-1 \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")

            echo "[$i/80] Status: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "Deploy succeeded."
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Deploy failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --region sa-east-1 \
                --query 'StandardErrorContent' \
                --output text
              exit 1
            fi

            sleep 15
          done

          echo "Timed out waiting for deploy"
          exit 1
