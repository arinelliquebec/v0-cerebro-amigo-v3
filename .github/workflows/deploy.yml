name: Deploy to EC2

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: SSM deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Deploy via SSM
        id: ssm
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-057860cd97edafefb" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "set -euo pipefail",
              "cd /opt/cerebro-amigo-v3",
              "git pull origin main",
              "docker compose build --pull",
              "docker compose up -d --remove-orphans",
              "sleep 20",
              "curl -sf http://localhost:5050/health | grep -q ok || { echo api-gateway unhealthy; exit 1; }",
              "wget -qO- http://localhost:8081/health | grep -q ok || { echo orchestrator-py unhealthy; exit 1; }",
              "wget -qO- http://localhost:8082/health | grep -q ok || { echo agents-py unhealthy; exit 1; }",
              "wget -qO- http://localhost:8083/health | grep -q ok || { echo notifier-py unhealthy; exit 1; }",
              "echo deploy ok"
            ]' \
            --timeout-seconds 1200 \
            --region sa-east-1 \
            --query 'Command.CommandId' \
            --output text)

          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT
          echo "SSM command: $COMMAND_ID"

      - name: Wait for deploy to finish
        run: |
          COMMAND_ID="${{ steps.ssm.outputs.command_id }}"
          INSTANCE_ID="i-057860cd97edafefb"

          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --region sa-east-1 \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")

            echo "[$i/60] Status: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "Deploy succeeded."
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Deploy failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --region sa-east-1 \
                --query 'StandardErrorContent' \
                --output text
              exit 1
            fi

            sleep 15
          done

          echo "Timed out waiting for deploy"
          exit 1
