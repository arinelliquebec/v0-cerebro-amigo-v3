name: Deploy to EC2

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

# ─── Rollback ──────────────────────────────────────────────────────────────
#
# Para reverter para um SHA anterior, conecte na EC2 via SSM e execute:
#
#   export IMAGE_TAG=<sha-anterior>
#   aws ecr get-login-password --region sa-east-1 \
#     | docker login --username AWS --password-stdin \
#       004177894935.dkr.ecr.sa-east-1.amazonaws.com
#   cd /opt/cerebro-amigo-v3
#   git checkout <sha-anterior> -- docker-compose.yml
#   docker compose pull
#   docker compose up -d --remove-orphans
#
# As imagens de SHAs anteriores ficam disponíveis no ECR enquanto a lifecycle
# policy (keep last 10) não as apagar. Ver infra/aws/setup-ecr.sh.

jobs:
  # ─── Job 0: gate de testes (BLOQUEIA o deploy se falhar) ─────────────────
  #
  # Tier 0 de segurança clínica: nenhuma imagem é buildada/deployada sem que
  # os testes dos serviços Python passem. Inclui o gate de fail-safe do
  # classificador de crise (ADR-006) e a integridade do dataset de crise.
  # Ver também .github/workflows/ci.yml (mesmo gate em pull requests).
  test:
    name: Tests (gate)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: orchestrator-py — lint + tests
        working-directory: apps/orchestrator-py
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          ruff check .
          pytest -q

      - name: agents-py — lint + tests
        working-directory: apps/agents-py
        run: |
          pip install -e ".[dev]"
          ruff check .
          pytest -q

  # ─── Job 1: build e push das 5 imagens para o ECR ────────────────────────
  build:
    name: Build & push to ECR
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: private

      - name: Build and push all images
        env:
          ECR: 004177894935.dkr.ecr.sa-east-1.amazonaws.com
          TAG: ${{ github.sha }}
        run: |
          set -euo pipefail

          # web — contexto = raiz do repo (Dockerfile usa monorepo root)
          docker build \
            -t "$ECR/cerebro-amigo/web:$TAG" \
            -f apps/web/Dockerfile \
            .
          docker push "$ECR/cerebro-amigo/web:$TAG"

          # api-gateway (.NET 10)
          docker build \
            -t "$ECR/cerebro-amigo/api-gateway:$TAG" \
            apps/api-gateway/
          docker push "$ECR/cerebro-amigo/api-gateway:$TAG"

          # orchestrator-py (LangGraph + caminho de crise)
          docker build \
            -t "$ECR/cerebro-amigo/orchestrator-py:$TAG" \
            apps/orchestrator-py/
          docker push "$ECR/cerebro-amigo/orchestrator-py:$TAG"

          # agents-py (batch + agentes analíticos)
          docker build \
            -t "$ECR/cerebro-amigo/agents-py:$TAG" \
            apps/agents-py/
          docker push "$ECR/cerebro-amigo/agents-py:$TAG"

          # notifier-py (web push)
          docker build \
            -t "$ECR/cerebro-amigo/notifier-py:$TAG" \
            apps/notifier-py/
          docker push "$ECR/cerebro-amigo/notifier-py:$TAG"

  # ─── Job 2: deploy via SSM (pull + up, sem build na EC2) ─────────────────
  deploy:
    name: SSM deploy
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Deploy via SSM
        id: ssm
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-057860cd97edafefb" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "set -euo pipefail",
              "export HOME=/root",
              "export IMAGE_TAG=${{ github.sha }}",
              "git config --global --add safe.directory /opt/cerebro-amigo-v3",
              "cd /opt/cerebro-amigo-v3",
              "git pull origin main",
              "aws ecr get-login-password --region sa-east-1 | docker login --username AWS --password-stdin 004177894935.dkr.ecr.sa-east-1.amazonaws.com",
              "docker compose pull",
              "docker compose up -d --remove-orphans",
              "for i in $(seq 1 30); do curl -sf http://localhost:5050/health | grep -q ok && curl -sf http://localhost:5050/ready | grep -q ready && break; [ $i -lt 30 ] && sleep 3 || { echo api-gateway nao saudavel; exit 1; }; done && echo api-gateway ok",
              "for i in $(seq 1 30); do curl -sf http://localhost:8081/health | grep -q ok && curl -sf http://localhost:8081/ready | grep -q ready && break; [ $i -lt 30 ] && sleep 3 || { echo orchestrator-py nao saudavel; exit 1; }; done && echo orchestrator-py ok",
              "for i in $(seq 1 30); do curl -sf http://localhost:8082/health | grep -q ok && curl -sf http://localhost:8082/ready | grep -q ready && break; [ $i -lt 30 ] && sleep 3 || { echo agents-py nao saudavel; exit 1; }; done && echo agents-py ok",
              "for i in $(seq 1 30); do curl -sf http://localhost:8083/health | grep -q ok && curl -sf http://localhost:8083/ready | grep -q ready && break; [ $i -lt 30 ] && sleep 3 || { echo notifier-py nao saudavel; exit 1; }; done && echo notifier-py ok",
              "echo deploy ok"
            ]' \
            --timeout-seconds 1200 \
            --region sa-east-1 \
            --query 'Command.CommandId' \
            --output text)

          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT
          echo "SSM command: $COMMAND_ID"

      - name: Wait for deploy to finish
        run: |
          COMMAND_ID="${{ steps.ssm.outputs.command_id }}"
          INSTANCE_ID="i-057860cd97edafefb"

          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --region sa-east-1 \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")

            echo "[$i/60] Status: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "Deploy succeeded."
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Deploy failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --region sa-east-1 \
                --query 'StandardErrorContent' \
                --output text
              exit 1
            fi

            sleep 15
          done

          echo "Timed out waiting for deploy"
          exit 1
