# Postgres é externo (RDS sa-east-1) — não entra aqui.
# Serviços Python autenticam na Bedrock via IAM role da EC2 (produção) ou AWS_PROFILE (dev).
#
# Só o stack clínico (5 serviços + coturn opcional). O Check-up Mental foi desacoplado
# para infra própria (ALB + ASG, ADR-045) — deploy dele via `deploy-checkup` no CI.
#
# image: → ECR em produção (tag = IMAGE_TAG=$GITHUB_SHA, definido pelo CI).
# build: → mantido para dev local; "docker compose up --build" constrói localmente.
# IMAGE_TAG não setado em dev → usa tag "latest" (construa local antes: docker compose build).
#
# ─── Isolamento de recurso (ADR-009 PR 1) ────────────────────────────────────
#
# Plano interativo (orchestrator-py, api-gateway, web): sem mem_limit — caminho de
# crise nunca é OOM-killed por pressão do batch. mem_reservation = piso suave que
# o OOM killer respeita ao escolher vítima.
#
# Plano batch (agents-py, notifier-py): mem_limit = teto duro; cpu_shares baixo =
# menor prioridade de CPU quando há contenção. Se agents-py explodir em RAM,
# o kernel mata o cgroup do batch, não o do orchestrator.
#
# Calibrar após medir: docker stats --no-stream
# Valores atuais conservadores para t3.small (2 vCPU / 2 GB RAM).

services:
  web:
    image: 004177894935.dkr.ecr.sa-east-1.amazonaws.com/cerebro-amigo/web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    # Plano interativo — sem teto de RAM.
    mem_reservation: 256m
    cpu_shares: 1024
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      API_GATEWAY_URL: http://api-gateway:5000
      ORCHESTRATOR_PY_URL: http://orchestrator-py:8081
      AGENTS_PY_URL: http://agents-py:8082
      NOTIFIER_PY_URL: http://notifier-py:8083
      # Cockpit de Aquisição (ADR-050): BFF clínico lê as métricas AGREGADAS do
      # Check-up (schema isolado) via HTTP — gateway não acessa o schema `checkup`.
      # Token: SSM SecureString (mesmo valor no Check-up, que valida). Sem ele → 503.
      CHECKUP_METRICS_TOKEN: ${CHECKUP_METRICS_TOKEN:-}
      CHECKUP_METRICS_URL: ${CHECKUP_METRICS_URL:-https://checkup.cerebroamigo.com.br/api/funnel-metrics}
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  api-gateway:
    image: 004177894935.dkr.ecr.sa-east-1.amazonaws.com/cerebro-amigo/api-gateway:${IMAGE_TAG:-latest}
    restart: unless-stopped
    build:
      context: ./apps/api-gateway
    # Plano interativo — sem teto de RAM.
    mem_reservation: 256m
    cpu_shares: 1024
    ports:
      - "5050:5000"
    env_file: .env
    # Override das URLs internas para a rede do compose. O .env traz valores
    # `localhost` (corretos p/ dev NATIVO); dentro do container, o gateway
    # precisa alcançar os serviços Python pelos nomes de serviço — senão
    # localhost:8082/8081 não resolve (quebra diário, gate de crise e SSE).
    environment:
      ORCHESTRATOR_PY_URL: http://orchestrator-py:8081
      AGENTS_PY_URL: http://agents-py:8082
      NOTIFIER_PY_URL: http://notifier-py:8083
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  orchestrator-py:
    image: 004177894935.dkr.ecr.sa-east-1.amazonaws.com/cerebro-amigo/orchestrator-py:${IMAGE_TAG:-latest}
    restart: unless-stopped
    build:
      context: ./apps/orchestrator-py
    # Caminho de crise — sem mem_limit intencional (ADR-009).
    # LangGraph checkpoint (psycopg3 pool 10) + asyncpg pool 20 + Bedrock Haiku/Sonnet.
    # mem_reservation = piso suave; OOM killer prioriza agents-py/notifier-py como vítimas.
    mem_reservation: 512m
    cpu_shares: 1024
    ports:
      - "8081:8081"
    env_file: .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  agents-py:
    image: 004177894935.dkr.ecr.sa-east-1.amazonaws.com/cerebro-amigo/agents-py:${IMAGE_TAG:-latest}
    restart: unless-stopped
    build:
      context: ./apps/agents-py
    # Plano batch — teto duro. scipy/numpy (padroes) + langchain-aws + asyncpg pool 10.
    # mem_limit: OOM killer mata este cgroup antes do orchestrator.
    # cpus: at most 1 vCPU; numa box de 2 vCPU, garante ≥1 livre pro orchestrator.
    # cpu_shares: prioridade baixa quando CPU contendida (orchestrator=1024 vs batch=256).
    # Evolução para disparo externo: ver infra/aws/eventbridge-agents-trigger.md
    mem_limit: 768m
    mem_reservation: 256m
    cpus: "1.0"
    cpu_shares: 256
    ports:
      - "8082:8082"
    env_file: .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8082/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  notifier-py:
    image: 004177894935.dkr.ecr.sa-east-1.amazonaws.com/cerebro-amigo/notifier-py:${IMAGE_TAG:-latest}
    restart: unless-stopped
    build:
      context: ./apps/notifier-py
    # Plano batch leve — sem LLM, sem scipy. Teto conservador.
    mem_limit: 256m
    mem_reservation: 64m
    cpus: "0.50"
    cpu_shares: 256
    ports:
      - "8083:8083"
    env_file: .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8083/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # TURN/STUN (coturn) para a teleconsulta P2P (ADR-026). Só RELAYA mídia quando
  # o P2P direto é bloqueado por NAT — no caminho feliz a mídia vai
  # browser↔browser e não passa por aqui. Sem mídia clínica armazenada.
  #
  # network_mode: host → o relay precisa do range de portas UDP + o IP público
  # real (external-ip). Ativar só onde houver IP público (prod):
  #   COMPOSE_PROFILES=turn docker compose up -d
  # Security group / firewall: abrir UDP 3478, TCP 3478 e UDP 49152-49251.
  # TURN_SECRET é o MESMO valor lido pelo gateway (HMAC da credencial efêmera).
  coturn:
    image: coturn/coturn:4.6
    profiles: ["turn"]
    network_mode: host
    restart: unless-stopped
    command: >
      -n --log-file=stdout --no-cli --no-tls --no-dtls
      --realm=${TURN_REALM:-cerebro-amigo}
      --use-auth-secret --static-auth-secret=${TURN_SECRET}
      --listening-port=3478
      --min-port=49152 --max-port=49251
      --external-ip=${TURN_EXTERNAL_IP}

  # Check-up Mental (apps/checkup) NÃO roda mais aqui — foi desacoplado para infra
  # própria (ALB + Auto Scaling Group), ver ADR-045 + infra/aws/checkup-asg-alb.yaml.
  # Superfície pública anônima isolada do box clínico (caminho de crise). Deploy do
  # checkup = build no CI → ECR → bump SSM /cerebro-amigo/checkup/image-tag + instance
  # refresh do ASG `cerebro-checkup-asg` (job `deploy-checkup` em deploy.yml).
